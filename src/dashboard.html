<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pluzo Cache</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow" id="appMode">Janela destacada</p>
          <h1>Pluzo Cache</h1>
          <p>Monitoramento local de cache, Worker, D1 e tenant REST.</p>
        </div>
        <div class="actions">
          <button id="openOptions" type="button">Dominios</button>
          <button id="clearRequests" type="button">Limpar</button>
          <button id="exportJson" type="button">Exportar JSON</button>
        </div>
      </header>

      <section class="toolbar">
        <label><input id="paused" type="checkbox" /> Pausar</label>
        <label><input id="relevantOnly" type="checkbox" /> Apenas relevantes</label>
        <label><input id="groupByRequest" type="checkbox" /> Agrupar request</label>
        <div id="domainList" class="pill-row"></div>
        <div id="originFilters" class="origin-filters"></div>
      </section>

      <section id="summary" class="summary"></section>

      <section class="table-card">
        <p id="emptyState" class="empty">Nenhuma requisicao registrada ainda. Abra um dominio monitorado e navegue.</p>
        <!-- DOC-GUARD: Pagina principal nao mostra Headers/Evidencias; esses dados seguem salvos/exportaveis. Regra: docs/requisitos.md. -->
        <table>
          <thead>
            <tr>
              <th><button class="sort-button" type="button" data-sort="time">Hora</button></th>
              <th><button class="sort-button" type="button" data-sort="request">Request</button></th>
              <th><button class="sort-button" type="button" data-sort="origin">Origem</button></th>
              <th><button class="sort-button" type="button" data-sort="status">Status</button></th>
              <th><button class="sort-button" type="button" data-sort="duration">Tempo</button></th>
              <th><button class="sort-button" type="button" data-sort="alerts">Alertas</button></th>
              <th><button class="sort-button" type="button" data-sort="ai">IA</button></th>
            </tr>
          </thead>
          <tbody id="requestRows"></tbody>
        </table>
      </section>
    </main>
    <script type="module" src="./dashboard.ts"></script>
  </body>
</html>
